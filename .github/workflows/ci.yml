name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: import smoke
        run: |
          python -c "import freemotion; from freemotion.protocol import Command, Reply; print('freemotion ok')"
          PYTHONPATH=examples/pipe_check python -c "import pipe_check; print('pipe_check ok')"

      - name: tests
        run: pytest -q tests
