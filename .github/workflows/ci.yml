name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: import smoke
        run: |
          python -c "import freemotion; from freemotion.protocol import Command, Reply; print('freemotion ok')"
          PYTHONPATH=examples/pipe_check python -c "import pipe_check; print('pipe_check ok')"
          PYTHONPATH=examples/pi_bench_demo python -c "import pi_bench_demo; print('pi_bench_demo ok')"
          python -c "from freemotion.hardware.pi import PiHardwareController; print('PiHardwareController ok')"
          python -c "from freemotion.vision import YoloVision, make_vision_from_config; print('YoloVision lazy import ok')"
          python -c "from freemotion.vision import PiCameraSource; print('PiCameraSource lazy import ok')"
          PYTHONPATH=examples/pi_camera_demo python -c "import pi_camera_demo; print('pi_camera_demo ok')"
          python -c "from freemotion.mission_control import GemmaMissionControl, make_mission_from_config; print('GemmaMissionControl lazy import ok')"

      - name: tests
        run: pytest -q tests
